# =============================================================================
# Inspector — Promptfoo eval suite
#
# Inspector has two LLM-touchpoints we can eval:
#   1. Synthetic-input generation: given a j-schema, produce a JSON object
#      that validates and is realistic enough to exercise the worker.
#   2. Safety scanner summarization: given a list of AST findings, produce
#      a human-readable summary the user can read in the Notion page.
#
# Each test exercises one of the two surfaces. Outputs are validated for
# structural correctness — not for "exact words", which would be brittle.
# =============================================================================
description: Inspector — synthetic input generator + safety summary
prompts:
  - file://../prompts/inspector.txt

providers:
  - id: anthropic:messages:claude-opus-4-7
    config:
      max_tokens: 1500
      temperature: 0.2

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.kind === 'synthetic' || o.kind === 'safety_summary'
          || `unknown kind: ${o.kind}`;

tests:
  # ---------- Synthetic input generation ----------
  - description: Synthetic input — required string field present + non-empty
    vars:
      task: synthetic
      schema: |
        j.object({ name: j.string(), age: j.number() })
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.kind === 'synthetic' && typeof o.input.name === 'string' && o.input.name.length > 0
            || 'name missing or empty';
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return typeof o.input.age === 'number' && Number.isFinite(o.input.age)
            || 'age missing or non-numeric';

  - description: Synthetic input — enum value is one of the allowed members
    vars:
      task: synthetic
      schema: |
        j.object({ status: j.enum(['open', 'closed', 'merged']) })
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return ['open', 'closed', 'merged'].includes(o.input.status)
            || `bad enum: ${o.input.status}`;

  - description: Synthetic input — nested object honors shape
    vars:
      task: synthetic
      schema: |
        j.object({ user: j.object({ id: j.string(), email: j.string() }) })
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.input.user && typeof o.input.user.id === 'string'
            && typeof o.input.user.email === 'string' && o.input.user.email.includes('@')
            || 'nested user shape wrong';

  - description: Synthetic input — array of strings is non-empty
    vars:
      task: synthetic
      schema: |
        j.object({ tags: j.array(j.string()) })
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return Array.isArray(o.input.tags) && o.input.tags.length >= 1
            && o.input.tags.every((t) => typeof t === 'string')
            || 'tags must be non-empty string[]';

  - description: Synthetic input — optional field may be omitted
    vars:
      task: synthetic
      schema: |
        j.object({ required: j.string(), optional: j.string().optional() })
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return typeof o.input.required === 'string' || 'required field missing';

  - description: Synthetic input — URL field is shaped like a URL
    vars:
      task: synthetic
      schema: |
        j.object({ webhookUrl: j.string() })
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return /^https?:\/\//.test(o.input.webhookUrl) || `not a URL: ${o.input.webhookUrl}`;

  # ---------- Safety summary ----------
  - description: Safety summary — zero findings yields a clean "pass" line
    vars:
      task: safety_summary
      findings: '[]'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.kind === 'safety_summary' && o.pass === true
            && typeof o.summary === 'string' && o.summary.length > 0
            || 'expected pass=true + non-empty summary';

  - description: Safety summary — single high-severity finding fails
    vars:
      task: safety_summary
      findings: |
        [{ "rule": "no-child-process", "severity": "high", "loc": { "line": 12 }, "message": "child_process.exec called" }]
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pass === false || 'expected pass=false on high finding';
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.summary.toLowerCase().includes('child_process') || 'rule name missing from summary';

  - description: Safety summary — mixed severity, top finding cited first
    vars:
      task: safety_summary
      findings: |
        [
          { "rule": "no-eval", "severity": "high", "loc": { "line": 5 }, "message": "eval() called" },
          { "rule": "no-any", "severity": "low", "loc": { "line": 8 }, "message": "explicit any" }
        ]
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pass === false || 'expected pass=false';
      - type: javascript
        value: |
          const o = JSON.parse(output);
          const idxHigh = o.summary.toLowerCase().indexOf('eval');
          const idxLow = o.summary.toLowerCase().indexOf('any');
          return idxHigh > -1 && (idxLow === -1 || idxHigh < idxLow)
            || 'high-severity finding should be cited before low';

  - description: Safety summary — never invents findings not in the input
    vars:
      task: safety_summary
      findings: '[]'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          // With zero findings, output must not name specific rules.
          return !/no-(eval|child_process|fs-write|any|dangerous)/.test(o.summary)
            || 'hallucinated rule name on empty input';
