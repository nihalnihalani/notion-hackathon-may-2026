# =============================================================================
# Shipper — Promptfoo eval suite
#
# Two LLM-touchpoints:
#   1. Release notes — given a generated worker + deploy metadata, write a
#      ≤300-char user-facing summary for the Notion page + email body.
#   2. Avatar prompt — turn the agent's name + description into a stylized
#      prompt for MiniMax image gen (must be ≤200 chars, image-style cues,
#      no people, no logos).
# =============================================================================
description: Shipper — release notes + avatar prompt formatters
prompts:
  - file://../prompts/shipper.txt

providers:
  - id: anthropic:messages:claude-opus-4-7
    config:
      max_tokens: 800
      temperature: 0.4

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return o.kind === 'release_notes' || o.kind === 'avatar_prompt'
          || `unknown kind: ${o.kind}`;

tests:
  # ---------- Release notes ----------
  - description: Release notes — non-empty, ≤300 chars
    vars:
      task: release_notes
      agentName: 'GitHub PR Summarizer'
      pattern: 'tool'
      capabilities: '["summarize-pr"]'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.kind === 'release_notes' && typeof o.text === 'string'
            && o.text.length > 0 && o.text.length <= 300
            || `bad length: ${o.text?.length}`;

  - description: Release notes — mentions the agent name
    vars:
      task: release_notes
      agentName: 'Daily Linear Standup'
      pattern: 'scheduled'
      capabilities: '["digest-issues"]'
    assert:
      - type: contains
        value: 'Daily Linear Standup'

  - description: Release notes — references the trigger style
    vars:
      task: release_notes
      agentName: 'Stripe Receipt Logger'
      pattern: 'webhook'
      capabilities: '["log-payment"]'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return /webhook|stripe|payment/i.test(o.text) || 'no trigger context';

  - description: Release notes — never includes the literal string "TODO" or "FIXME"
    vars:
      task: release_notes
      agentName: 'CSV Importer'
      pattern: 'tool'
      capabilities: '["import-csv"]'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return !/\b(TODO|FIXME|XXX)\b/.test(o.text) || 'placeholder marker in release notes';

  # ---------- Avatar prompt ----------
  - description: Avatar prompt — ≤200 chars, image style cues
    vars:
      task: avatar_prompt
      agentName: 'GitHub PR Summarizer'
      description: 'Summarizes the latest PR on a GitHub repo.'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.kind === 'avatar_prompt' && typeof o.prompt === 'string'
            && o.prompt.length > 0 && o.prompt.length <= 200
            || `bad length: ${o.prompt?.length}`;
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return /icon|illustration|flat|isometric|minimal|vector|gradient/i.test(o.prompt)
            || 'no image-style cue in prompt';

  - description: Avatar prompt — no people / faces
    vars:
      task: avatar_prompt
      agentName: 'Daily Linear Standup'
      description: 'Posts a Linear digest every morning.'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return !/(person|people|face|human|man|woman|child)/i.test(o.prompt)
            || 'avatar prompt mentions people';

  - description: Avatar prompt — no brand logos
    vars:
      task: avatar_prompt
      agentName: 'Stripe Receipt Logger'
      description: 'Logs Stripe payments into Notion.'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return !/(stripe logo|github logo|google logo|brand mark)/i.test(o.prompt)
            || 'avatar prompt mentions brand logo';

  - description: Avatar prompt — themed to the use case
    vars:
      task: avatar_prompt
      agentName: 'Calendar Cleaner'
      description: 'Deletes stale events from Google Calendar.'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return /calendar|event|clock|date|time|schedule/i.test(o.prompt)
            || 'no thematic cue';

  - description: Avatar prompt — no NSFW / unsafe descriptors
    vars:
      task: avatar_prompt
      agentName: 'Quiet Reminder'
      description: 'Sends a gentle reminder.'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          const banned = ['nsfw', 'gore', 'blood', 'weapon', 'gun', 'knife', 'nude'];
          return !banned.some((w) => o.prompt.toLowerCase().includes(w))
            || 'unsafe word in prompt';

  - description: Avatar prompt — always recommends a square aspect (1:1)
    vars:
      task: avatar_prompt
      agentName: 'Newsletter Importer'
      description: 'Imports newsletter signups.'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return /1:1|square|1024x1024/.test(o.prompt) || 'no aspect-ratio hint';
