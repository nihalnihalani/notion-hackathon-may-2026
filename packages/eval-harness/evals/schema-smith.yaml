# =============================================================================
# Schema Smith — Promptfoo eval suite
#
# Input: an English description of a Notion Custom Agent.
# Expected output: a JSON object matching SchemaSmithResult:
#   {
#     "pattern":         "tool" | "sync" | "webhook" | "scheduled" | "hybrid"
#     "inputSchema":     j-schema TS source (string)
#     "outputSchema":    j-schema TS source (string)
#     "requiredScopes":  string[]  (Notion scope strings)
#     "requiredOAuth":   string[]  (e.g. ["github", "linear"])
#     "rationale":       string    (≤500 chars)
#   }
#
# Test cases assert structural correctness (the parsed JSON shape) and key
# semantic invariants (pattern matches the use case, scopes are a sane
# subset). Cost-controlled: each test uses ≤500 output tokens.
# =============================================================================
description: Schema Smith — English → schema spec
prompts:
  - file://../prompts/schema-smith.txt

providers:
  - id: anthropic:messages:claude-opus-4-7
    config:
      max_tokens: 1500
      temperature: 0.1
      # Prompt cache the (large) system prompt across the whole sweep.
      headers:
        anthropic-beta: 'prompt-caching-2024-07-31'

defaultTest:
  assert:
    # Output MUST be valid JSON.
    - type: is-json
    # Top-level keys must match the SchemaSmithResult contract exactly.
    - type: javascript
      value: |
        const o = JSON.parse(output);
        const required = ['pattern', 'inputSchema', 'outputSchema', 'requiredScopes', 'requiredOAuth', 'rationale'];
        const missing = required.filter((k) => !(k in o));
        return missing.length === 0 || `missing keys: ${missing.join(',')}`;
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return ['tool', 'sync', 'webhook', 'scheduled', 'hybrid'].includes(o.pattern)
          || `unknown pattern: ${o.pattern}`;
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return Array.isArray(o.requiredScopes) && o.requiredScopes.every((s) => typeof s === 'string')
          || 'requiredScopes must be string[]';
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return typeof o.rationale === 'string' && o.rationale.length > 0 && o.rationale.length <= 500
          || 'rationale must be 1..500 chars';
    # j-schema TS source must reference j.<kind>(...) at least once.
    - type: javascript
      value: |
        const o = JSON.parse(output);
        return /\bj\.(object|string|number|boolean|array|enum|union|literal|optional|nullable)\(/.test(o.inputSchema)
          || 'inputSchema must use j.<kind>(...) form';

tests:
  # ---------- 1. Simple GitHub PR summarizer ----------
  - description: GitHub PR summarizer → tool pattern, repo scope, github oauth
    vars:
      description: |
        Summarize the latest pull request on a GitHub repo and post the
        summary to a Notion page.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pattern === 'tool' || `expected pattern=tool, got ${o.pattern}`;
      - type: contains
        value: github
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.requiredOAuth.includes('github') || 'missing github in requiredOAuth';

  # ---------- 2. Daily Linear standup ----------
  - description: Daily Linear standup → scheduled pattern, linear oauth
    vars:
      description: |
        Every weekday at 9am, fetch all Linear issues moved to "In Review"
        in the past 24h and write a standup digest to a Notion page.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pattern === 'scheduled' || `expected pattern=scheduled, got ${o.pattern}`;
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.requiredOAuth.includes('linear') || 'missing linear in requiredOAuth';

  # ---------- 3. Stripe webhook ----------
  - description: Stripe webhook → webhook pattern, stripe oauth
    vars:
      description: |
        When Stripe sends an invoice.paid webhook, append a row to a
        revenue Notion DB with amount + customer email.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pattern === 'webhook' || `expected pattern=webhook, got ${o.pattern}`;
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.requiredOAuth.includes('stripe') || 'missing stripe in requiredOAuth';

  # ---------- 4. Two-way Linear sync ----------
  - description: Notion ↔ Linear sync → sync pattern
    vars:
      description: |
        Keep a Notion task DB in two-way sync with a Linear project — when a
        Notion task changes status, update the Linear issue, and vice versa.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pattern === 'sync' || `expected pattern=sync, got ${o.pattern}`;

  # ---------- 5. Slack notifier ----------
  - description: Slack notifier → tool pattern, slack oauth
    vars:
      description: |
        Send a Slack message to #engineering whenever a Notion page in the
        "Incidents" DB is created.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pattern === 'webhook' || o.pattern === 'tool'
            || `expected webhook|tool, got ${o.pattern}`;
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.requiredOAuth.includes('slack') || 'missing slack in requiredOAuth';

  # ---------- 6. Google Drive scraper ----------
  - description: Google Drive folder watcher → scheduled, google oauth
    vars:
      description: |
        Every hour, list new files in a specific Google Drive folder and
        create a Notion page for each one with a download link.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pattern === 'scheduled' || `expected pattern=scheduled, got ${o.pattern}`;
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.requiredOAuth.includes('google') || 'missing google in requiredOAuth';

  # ---------- 7. Ambiguous prompt — hybrid ----------
  - description: Ambiguous prompt should pick a single concrete pattern (not "hybrid")
    vars:
      description: 'Do something useful with my Notion data.'
    # No specific pattern asserted — just that the schema is valid + rationale
    # explains the choice (which the default assertions already cover). Use
    # this as a robustness check; if the model crashes on vague input the
    # nightly run will catch it.

  # ---------- 8. Read-only tool needs read-only scope ----------
  - description: Read-only summarizer → no write scopes
    vars:
      description: |
        Read all pages in a Notion DB and post a daily summary email via
        Resend. Do not modify any Notion content.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          const writeScopes = o.requiredScopes.filter((s) => /write|update|insert|delete/i.test(s));
          return writeScopes.length === 0 || `unexpected write scope(s): ${writeScopes.join(',')}`;

  # ---------- 9. Tool pattern requires tool callable ----------
  - description: User-triggered "summarize this page" → tool pattern
    vars:
      description: |
        When I click the Forge button on a Notion page, generate a 5-bullet
        summary of that page using Claude and replace the page body.
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.pattern === 'tool' || `expected pattern=tool, got ${o.pattern}`;

  # ---------- 10. Output schema must exist for tool callable ----------
  - description: All tool patterns must produce a non-empty outputSchema
    vars:
      description: 'Calculate the days between two Notion date properties.'
    assert:
      - type: javascript
        value: |
          const o = JSON.parse(output);
          return o.outputSchema.length > 20 || `outputSchema too short: ${o.outputSchema.length} chars`;

  # ---------- 11. Long description does not break the parser ----------
  - description: 800-char description does not crash the agent
    vars:
      description: |
        We run a weekly newsletter platform and need to keep our Notion DB
        of subscribers perfectly in sync with our ConvertKit list. When a
        subscriber confirms in ConvertKit, append them to Notion with their
        UTM source, signup IP, and the campaign that drove the signup.
        When a Notion editor flags a subscriber as a "VIP", push a tag to
        ConvertKit. Every Monday, generate a digest of new VIPs and email
        the editorial team via Resend. Also keep an audit log Notion DB
        showing every sync direction + timestamp so we can debug data
        drift. Avoid storing any PII outside Notion itself.
    # Default assertions only — this is a fuzz check.
