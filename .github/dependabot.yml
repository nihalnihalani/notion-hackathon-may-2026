# =============================================================================
# Dependabot — weekly npm + github-actions updates.
#
# Picked Dependabot over Renovate for simplicity (one config, no extra
# bot account, native GitHub UI). Grouped major-version PRs so we get one
# PR per upgrade window instead of dozens.
# =============================================================================
version: 2
updates:
  # ---------------------------------------------------------------------------
  # npm — root + every workspace package.
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    versioning-strategy: increase
    ignore:
      # Pre-releases are usually noisy and break installs; pin manually
      # when we want them.
      - dependency-name: '*'
        versions:
          - '*-alpha*'
          - '*-beta*'
          - '*-rc*'
          - '*-next*'
          - '*-canary*'
          - '*-experimental*'
    groups:
      # One PR per major upgrade window across the entire monorepo.
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      development-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'typescript-eslint'
      vitest:
        patterns:
          - 'vitest*'
          - '@vitest/*'
      next-stack:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@next/*'
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    labels:
      - dependencies

  # ---------------------------------------------------------------------------
  # GitHub Actions — keep pinned action versions up to date.
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        versions:
          - '*-alpha*'
          - '*-beta*'
          - '*-rc*'
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci
