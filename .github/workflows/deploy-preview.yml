# =============================================================================
# Forge — Deploy (preview)
#
# Runs on every pull request targeting main. This workflow always lints +
# checks changed-file formatting + typechecks + tests + verify-envs + builds
# the PR using the same stubbed environment as CI. It intentionally does not
# create optional PlanetScale/Vercel/E2E jobs, because this repository does not
# have preview-provider secrets configured yet; those live in the manual
# `deploy-preview-external.yml` workflow.
#
# The Vercel GitHub integration can also auto-build previews, but provider
# previews should be run through the manual external workflow so they are
# gated on CI-equivalent checks first.
#
# =============================================================================
name: Deploy (preview)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel any in-flight preview deploy for the same PR — newer commits win.
concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: '1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Lint / format / typecheck / test / build / verify-env
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Match `verify-env` stub values from ci.yml exactly so a passing CI run
    # implies this job will also pass. Drift is a smell — review both together.
    env:
      NEXT_PUBLIC_APP_URL: https://forge.example.com
      ANTHROPIC_API_KEY: sk-ant-fake-ci-stub
      # 32-char suffix after sk-proj- satisfies the tightened length floor in
      # scripts/verify-env.ts. Keep in lockstep with .github/workflows/ci.yml.
      OPENAI_API_KEY: sk-proj-fake-ci-stub-00000000000000000000
      OPENAI_ORG_ID: org-fake-ci-stub
      NOTION_OAUTH_CLIENT_ID: notion-fake-ci-stub
      NOTION_OAUTH_CLIENT_SECRET: notion-secret-fake-ci-stub
      NOTION_OAUTH_REDIRECT_URI: https://forge.example.com/api/auth/notion/callback
      NOTION_WEBHOOK_SECRET: notion-webhook-fake-ci-stub
      NTN_VERSION: 0.1.x
      CLERK_SECRET_KEY: sk_test_fake_ci_stub
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake_ci_stub
      CLERK_WEBHOOK_SECRET: whsec_fake_ci_stub
      CLERK_JWT_KEY: clerk-jwt-fake-ci-stub
      DATABASE_URL: postgres://user:pass@localhost:5432/forge
      VERCEL_AI_GATEWAY_API_KEY: gateway-fake-ci-stub
      VERCEL_BLOB_READ_WRITE_TOKEN: vercel_blob_rw_fake_ci_stub
      VERCEL_EDGE_CONFIG: https://edge-config.vercel.com/fake_ci_stub
      SENTRY_DSN: https://fake@o0.ingest.sentry.io/0
      NEXT_PUBLIC_SENTRY_DSN: https://fake@o0.ingest.sentry.io/0
      SENTRY_AUTH_TOKEN: sntrys_fake_ci_stub
      SENTRY_ORG: forge-dev
      SENTRY_PROJECT: forge-web
      POSTHOG_KEY: phc_fake_ci_stub
      NEXT_PUBLIC_POSTHOG_KEY: phc_fake_ci_stub
      RESEND_API_KEY: re_fake_ci_stub
      RESEND_FROM_EMAIL: forge@example.com
      UPSTASH_REDIS_REST_URL: https://fake.upstash.io
      UPSTASH_REDIS_REST_TOKEN: upstash-fake-ci-stub
      MINIMAX_API_KEY: minimax-fake-ci-stub
      MINIMAX_GROUP_ID: minimax-group-fake-ci-stub
      STRIPE_SECRET_KEY: sk_test_stripe_fake_ci_stub
      STRIPE_WEBHOOK_SECRET: whsec_stripe_fake_ci_stub
      FORGE_INTERNAL_TOKEN: ci_stub_token_0000000000000000000000000000000000000000000000
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-preview-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-preview-
      - run: bash scripts/ci/install.sh
      - name: Lint / format / typecheck / test / build / verify-env
        run: |
          echo "::group::lint"
          pnpm lint -- --max-warnings=0
          echo "::endgroup::"
          echo "::group::format changed files"
          pnpm format:check:changed -- "${BASE_SHA}" "${HEAD_SHA}"
          echo "::endgroup::"
          echo "::group::typecheck"
          pnpm typecheck
          echo "::endgroup::"
          echo "::group::test"
          pnpm test
          echo "::endgroup::"
          echo "::group::build"
          pnpm build
          echo "::endgroup::"
          echo "::group::verify-env"
          pnpm verify:env
          echo "::endgroup::"
