# =============================================================================
# Forge — Deploy (preview)
#
# Runs on every pull request targeting main. This workflow always lints +
# checks changed-file formatting + typechecks + tests + verify-envs + builds
# the PR. When preview-provider secrets are configured, it then branches the
# PlanetScale prod schema into a per-PR DB branch, deploys the resulting build
# to Vercel as a preview, posts the preview URL and DB branch as a sticky PR
# comment, and (when the PR carries the `e2e` label) runs the Playwright
# happy-path suite against the live preview URL.
#
# The Vercel GitHub integration can also auto-build previews, but we drive
# it from CI so the deploy is gated on CI-equivalent checks passing first —
# no green check, no preview URL.
#
# Preview deploy GitHub secrets (Repository Settings -> Secrets and variables
# -> Actions). The verify job always runs; external preview deployment is
# skipped unless every secret below is configured:
#   VERCEL_TOKEN              Personal/Service token for the Vercel CLI
#   VERCEL_ORG_ID             Vercel team / org id (`vercel link` writes it)
#   VERCEL_PROJECT_ID         Forge project id in Vercel
#   PLANETSCALE_SERVICE_TOKEN PlanetScale service-token value
#   PLANETSCALE_SERVICE_TOKEN_ID PlanetScale service-token id
#   PLANETSCALE_ORG           PlanetScale org slug (e.g. "forge")
#   PLANETSCALE_DB            PlanetScale database name (e.g. "forge-prod")
# =============================================================================
name: Deploy (preview)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Cancel any in-flight preview deploy for the same PR — newer commits win.
concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: '1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Verify the PR is shippable before we spend a deploy slot on it.
  # ---------------------------------------------------------------------------
  verify:
    name: Lint / format / typecheck / test / build / verify-env
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Match `verify-env` stub values from ci.yml exactly so a passing CI run
    # implies this job will also pass. Drift is a smell — review both together.
    env:
      NEXT_PUBLIC_APP_URL: https://forge.example.com
      ANTHROPIC_API_KEY: sk-ant-fake-ci-stub
      # 32-char suffix after sk-proj- satisfies the tightened length floor in
      # scripts/verify-env.ts. Keep in lockstep with .github/workflows/ci.yml.
      OPENAI_API_KEY: sk-proj-fake-ci-stub-00000000000000000000
      OPENAI_ORG_ID: org-fake-ci-stub
      NOTION_OAUTH_CLIENT_ID: notion-fake-ci-stub
      NOTION_OAUTH_CLIENT_SECRET: notion-secret-fake-ci-stub
      NOTION_OAUTH_REDIRECT_URI: https://forge.example.com/api/auth/notion/callback
      NOTION_WEBHOOK_SECRET: notion-webhook-fake-ci-stub
      NTN_VERSION: 0.1.x
      CLERK_SECRET_KEY: sk_test_fake_ci_stub
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake_ci_stub
      CLERK_WEBHOOK_SECRET: whsec_fake_ci_stub
      CLERK_JWT_KEY: clerk-jwt-fake-ci-stub
      DATABASE_URL: postgres://user:pass@localhost:5432/forge
      VERCEL_AI_GATEWAY_API_KEY: gateway-fake-ci-stub
      VERCEL_BLOB_READ_WRITE_TOKEN: vercel_blob_rw_fake_ci_stub
      VERCEL_EDGE_CONFIG: https://edge-config.vercel.com/fake_ci_stub
      SENTRY_DSN: https://fake@o0.ingest.sentry.io/0
      NEXT_PUBLIC_SENTRY_DSN: https://fake@o0.ingest.sentry.io/0
      SENTRY_AUTH_TOKEN: sntrys_fake_ci_stub
      SENTRY_ORG: forge-dev
      SENTRY_PROJECT: forge-web
      POSTHOG_KEY: phc_fake_ci_stub
      NEXT_PUBLIC_POSTHOG_KEY: phc_fake_ci_stub
      RESEND_API_KEY: re_fake_ci_stub
      RESEND_FROM_EMAIL: forge@example.com
      UPSTASH_REDIS_REST_URL: https://fake.upstash.io
      UPSTASH_REDIS_REST_TOKEN: upstash-fake-ci-stub
      MINIMAX_API_KEY: minimax-fake-ci-stub
      MINIMAX_GROUP_ID: minimax-group-fake-ci-stub
      STRIPE_SECRET_KEY: sk_test_stripe_fake_ci_stub
      STRIPE_WEBHOOK_SECRET: whsec_stripe_fake_ci_stub
      FORGE_INTERNAL_TOKEN: ci_stub_token_0000000000000000000000000000000000000000000000
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-preview-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-preview-
      - run: bash scripts/ci/install.sh
      - name: Lint / format / typecheck / test / build / verify-env
        run: |
          echo "::group::lint"
          pnpm lint -- --max-warnings=0
          echo "::endgroup::"
          echo "::group::format changed files"
          pnpm format:check:changed -- "${BASE_SHA}" "${HEAD_SHA}"
          echo "::endgroup::"
          echo "::group::typecheck"
          pnpm typecheck
          echo "::endgroup::"
          echo "::group::test"
          pnpm test
          echo "::endgroup::"
          echo "::group::build"
          pnpm build
          echo "::endgroup::"
          echo "::group::verify-env"
          pnpm verify:env
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # 2. Detect whether external preview infrastructure is configured. Pull
  #    request verification must stay green for repos that have not wired
  #    PlanetScale/Vercel secrets yet, but once those secrets exist the deploy
  #    path below becomes a real gate.
  # ---------------------------------------------------------------------------
  preview-config:
    name: Preview deploy config
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
      PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
      PLANETSCALE_ORG: ${{ secrets.PLANETSCALE_ORG }}
      PLANETSCALE_DB: ${{ secrets.PLANETSCALE_DB }}
    steps:
      - id: check
        name: Check preview deploy secrets
        run: |
          set -euo pipefail
          missing=()
          for name in \
            VERCEL_TOKEN \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID \
            PLANETSCALE_SERVICE_TOKEN \
            PLANETSCALE_SERVICE_TOKEN_ID \
            PLANETSCALE_ORG \
            PLANETSCALE_DB; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Preview deploy skipped"
              echo
              echo "CI verification still ran. Configure these GitHub Actions secrets to enable the external PlanetScale + Vercel preview path:"
              printf -- "- \`%s\`\n" "${missing[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Preview deploy is fully configured." >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 3. Branch PlanetScale prod into a per-PR DB branch so the preview deploy
  #    talks to its own isolated schema. Idempotent: pscale will exit non-zero
  #    if the branch already exists, which we tolerate.
  # ---------------------------------------------------------------------------
  planetscale-branch:
    name: PlanetScale preview branch
    needs: [verify, preview-config]
    if: github.event.pull_request.head.repo.full_name == github.repository && needs.preview-config.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      branch_name: ${{ steps.branch.outputs.branch_name }}
      branch_url: ${{ steps.branch.outputs.branch_url }}
    env:
      PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
      PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
      PSCALE_ORG: ${{ secrets.PLANETSCALE_ORG }}
      PSCALE_DB: ${{ secrets.PLANETSCALE_DB }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pscale CLI
        uses: planetscale/setup-pscale-action@v1
      - id: branch
        name: Create or reuse preview branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          BRANCH="preview-pr-${PR_NUMBER}"
          echo "::group::pscale branch create (idempotent)"
          if pscale branch show "${PSCALE_DB}" "${BRANCH}" --org "${PSCALE_ORG}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — reusing."
          else
            pscale branch create "${PSCALE_DB}" "${BRANCH}" \
              --from main --org "${PSCALE_ORG}" --wait
          fi
          echo "::endgroup::"
          BRANCH_URL="https://app.planetscale.com/${PSCALE_ORG}/${PSCALE_DB}/${BRANCH}"
          echo "branch_name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "branch_url=${BRANCH_URL}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 4. Deploy preview to Vercel via CLI. We `vercel build` first so the
  #    artifact uploaded to Vercel is identical to what CI just verified.
  # ---------------------------------------------------------------------------
  vercel-preview:
    name: Vercel preview deploy
    needs: [verify, preview-config, planetscale-branch]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && needs.verify.result == 'success' && needs.preview-config.outputs.enabled == 'true' && needs.planetscale-branch.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: bash scripts/ci/install.sh
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest
      - name: Pull Vercel env (preview)
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"
      - name: Build
        run: vercel build --token="${VERCEL_TOKEN}"
      - id: deploy
        name: Deploy prebuilt artifact
        run: |
          set -euo pipefail
          echo "::group::vercel deploy"
          URL=$(vercel deploy --prebuilt --token="${VERCEL_TOKEN}" \
            --meta githubCommitSha="${GITHUB_SHA}" \
            --meta githubPrNumber="${{ github.event.pull_request.number }}")
          echo "::endgroup::"
          echo "preview_url=${URL}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 5. Sticky PR comment with preview + DB branch URLs.
  # ---------------------------------------------------------------------------
  pr-comment:
    name: Sticky PR comment
    needs: [verify, preview-config, planetscale-branch, vercel-preview]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && needs.verify.result == 'success' && needs.preview-config.outputs.enabled == 'true' && needs.planetscale-branch.result == 'success' && needs.vercel-preview.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Upsert sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: forge-preview
          message: |
            ### Forge preview is up

            | What | Where |
            | --- | --- |
            | Preview deploy | ${{ needs.vercel-preview.outputs.preview_url }} |
            | DB branch | ${{ needs.planetscale-branch.outputs.branch_url }} |
            | Commit | `${{ github.event.pull_request.head.sha }}` |

            Add the **`e2e`** label to this PR to run the Playwright happy-path suite against the preview URL.

  # ---------------------------------------------------------------------------
  # 6. Playwright E2E — opt-in via the `e2e` label so PRs without UI changes
  #    don't pay the cost.
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E (opt-in via `e2e` label)
    needs: [preview-config, vercel-preview]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && needs.preview-config.outputs.enabled == 'true' && needs.vercel-preview.result == 'success' && contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: ${{ needs.vercel-preview.outputs.preview_url }}
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: bash scripts/ci/install.sh
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E
        run: pnpm exec playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 14
