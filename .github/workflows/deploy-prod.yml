# =============================================================================
# Forge — Deploy (production)
#
# Runs on every push to main (post-merge). Pipeline:
#   1. Re-run the release-candidate gates that must be true before prod.
#   2. Install + build the monorepo with Turbo (cached).
#   3. `prisma migrate deploy` against PlanetScale prod via the DATABASE_URL
#      secret — safe because migrate deploy only forward-applies migrations
#      already in git.
#   4. `vercel deploy --prod` from a prebuilt artifact (deterministic — the
#      same SHA produces the same upload).
#   5. Upload Sentry source maps + create a release marker.
#   6. Smoke-test `/api/healthz` against the new prod URL.
#   7. Notify Slack on either outcome; on failure also open a GitHub issue
#      so an on-call human reviews before any rollback.
#
# Rollbacks are *manual* — see docs/CI_CD.md ("Rollback procedure"). We
# don't auto-revert because the most common deploy failure is a bad
# migration, and reverting the merge without manually rolling the schema
# back can corrupt prod data.
#
# Deployment provider work is enabled when these GitHub secrets exist:
#   VERCEL_TOKEN          Vercel CLI token
#   VERCEL_ORG_ID         Vercel team / org id
#   VERCEL_PROJECT_ID     Forge project id in Vercel
#   DATABASE_URL          PlanetScale prod connection string
#                         (use a Prisma-shadow-safe role: SELECT/INSERT/
#                          UPDATE/DELETE/CREATE/ALTER/DROP/INDEX)
#   SENTRY_AUTH_TOKEN     Sentry release upload token (scope: project:releases)
#   SENTRY_ORG            Sentry org slug
#   SENTRY_PROJECT        Sentry project slug
# Optional GitHub secret:
#   SLACK_WEBHOOK_URL     Slack incoming-webhook URL (channel: #forge-deploys)
# =============================================================================
name: Deploy (production)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip prisma migrate deploy (use only for hotfixes with zero schema changes)'
        type: boolean
        default: false

# Queue depth 1: cancel any older in-flight prod deploy so the freshest
# commit on main always wins. We never want two prod deploys racing.
concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  deployments: write

env:
  NODE_VERSION: '20'
  TURBO_TELEMETRY_DISABLED: '1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Verify the release candidate before touching production systems.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgres://stub:stub@localhost:5432/stub
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-prod-verify-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-prod-verify-
      - run: bash scripts/ci/install.sh
      - name: Lint / typecheck / test / prisma validate
        run: |
          echo "::group::lint"
          pnpm lint -- --max-warnings=0
          echo "::endgroup::"
          echo "::group::typecheck"
          pnpm typecheck
          echo "::endgroup::"
          echo "::group::test"
          pnpm test
          echo "::endgroup::"
          echo "::group::prisma validate"
          pnpm --filter @forge/db exec prisma validate
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # 2. Build the monorepo. Cached against pnpm-lock + the source tree.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-prod-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-prod-
      - run: bash scripts/ci/install.sh
      - name: Turbo build
        run: pnpm build

  # ---------------------------------------------------------------------------
  # 2b. Decide whether external production systems are configured. Main pushes
  #     should still stay green when this repository has not been connected to
  #     Vercel/PlanetScale/Sentry yet; manual deploys fail fast so maintainers
  #     get an explicit missing-secret error.
  # ---------------------------------------------------------------------------
  preflight:
    name: Production deploy preflight
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy_enabled: ${{ steps.secrets.outputs.deploy_enabled }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - id: secrets
        name: Check production provider secrets
        run: |
          set -euo pipefail

          missing=()
          for name in \
            VERCEL_TOKEN \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID \
            DATABASE_URL \
            SENTRY_AUTH_TOKEN \
            SENTRY_ORG \
            SENTRY_PROJECT; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Production deploy skipped"
              echo
              echo "Release-candidate verification and build completed, but external production deploy is disabled because these Actions secrets are missing:"
              echo
              for name in "${missing[@]}"; do
                echo "- \`${name}\`"
              done
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              printf '::error::Missing required production deploy secrets: %s\n' "${missing[*]}"
              exit 1
            fi

            printf '::warning::Production provider secrets are not configured; skipping external deploy: %s\n' "${missing[*]}"
            exit 0
          fi

          echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          echo "### Production deploy enabled" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # 3. Apply pending migrations to PlanetScale prod *before* the new app
  #    code goes live. `migrate deploy` only forward-applies migrations
  #    already in git, so re-runs against the same SHA are no-ops.
  # ---------------------------------------------------------------------------
  migrate:
    name: Prisma migrate deploy
    needs: [build, preflight]
    if: ${{ needs.preflight.outputs.deploy_enabled == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.skip_migrations) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: bash scripts/ci/install.sh
      - name: Apply migrations
        run: |
          echo "::group::prisma migrate deploy"
          pnpm --filter @forge/db exec prisma migrate deploy
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # 4. Vercel production deploy (prebuilt — identical artifact across re-runs).
  # ---------------------------------------------------------------------------
  vercel-prod:
    name: Vercel production deploy
    needs: [build, preflight, migrate]
    # Run even if migrate was skipped via workflow_dispatch.
    if: always() && needs.preflight.outputs.deploy_enabled == 'true' && needs.build.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      prod_url: ${{ steps.deploy.outputs.prod_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: bash scripts/ci/install.sh
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest
      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
      - name: Build (production)
        run: vercel build --prod --token="${VERCEL_TOKEN}"
      - id: deploy
        name: Deploy prebuilt artifact (production)
        run: |
          set -euo pipefail
          echo "::group::vercel deploy --prod"
          URL=$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" \
            --meta githubCommitSha="${GITHUB_SHA}")
          echo "::endgroup::"
          echo "prod_url=${URL}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 5. Upload Sentry source maps + create a release marker.
  #    Idempotent: Sentry no-ops if the release already exists.
  # ---------------------------------------------------------------------------
  sentry-release:
    name: Sentry release + source maps
    needs: [preflight, vercel-prod]
    if: ${{ needs.preflight.outputs.deploy_enabled == 'true' && needs.vercel-prod.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: bash scripts/ci/install.sh
      - name: Rebuild for source maps
        # Sentry needs the build artifact present (with .map files) — `next
        # build` runs alongside the SENTRY_AUTH_TOKEN env which is what
        # uploads maps. We rebuild here rather than passing artifacts
        # between jobs because Next builds aren't portable across runners.
        run: pnpm --filter @forge/web build
      - name: Sentry release
        uses: getsentry/action-release@v3
        with:
          environment: production
          release: ${{ github.sha }}
          sourcemaps: apps/web/.next
          set_commits: auto
          finalize: true

  # ---------------------------------------------------------------------------
  # 6. Smoke test — fail the deploy if /api/healthz isn't returning ok.
  # ---------------------------------------------------------------------------
  smoke:
    name: Post-deploy smoke (/api/healthz)
    needs: [preflight, vercel-prod]
    if: ${{ needs.preflight.outputs.deploy_enabled == 'true' && needs.vercel-prod.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Curl /api/healthz
        env:
          PROD_URL: ${{ needs.vercel-prod.outputs.prod_url }}
        run: |
          set -euo pipefail
          echo "::group::healthz"
          # Retry up to 5 times with 5s backoff to absorb propagation lag.
          for i in 1 2 3 4 5; do
            BODY=$(curl -fsS "${PROD_URL}/api/healthz" || true)
            STATUS=$(printf '%s' "${BODY}" | jq -r '.status // empty' 2>/dev/null || true)
            if [ "${STATUS}" = "ok" ]; then
              echo "healthz ok on attempt ${i}"
              echo "${BODY}" | jq .
              echo "::endgroup::"
              exit 0
            fi
            echo "attempt ${i} failed; sleeping 5s"
            sleep 5
          done
          echo "::error::healthz did not return status=ok after 5 attempts"
          echo "::endgroup::"
          exit 1

  # ---------------------------------------------------------------------------
  # 6b. Optional live E2E — runs the real trigger/poll flow when the protected
  #     branch has a Clerk test session secret configured.
  # ---------------------------------------------------------------------------
  live-e2e:
    name: Production live E2E
    needs: [preflight, vercel-prod, smoke]
    if: ${{ needs.preflight.outputs.deploy_enabled == 'true' && needs.vercel-prod.result == 'success' && needs.smoke.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROD_URL: ${{ needs.vercel-prod.outputs.prod_url }}
      FORGE_E2E_CLERK_SESSION: ${{ secrets.FORGE_E2E_CLERK_SESSION }}
      FORGE_E2E_DESCRIPTION: ${{ secrets.FORGE_E2E_DESCRIPTION }}
      FORGE_E2E_TIMEOUT_MS: ${{ secrets.FORGE_E2E_TIMEOUT_MS }}
    steps:
      - id: preflight
        name: Check live E2E secrets
        run: |
          set -euo pipefail
          if [ -z "${FORGE_E2E_CLERK_SESSION:-}" ]; then
            {
              echo "enabled=false"
              echo "### Production live E2E skipped"
              echo
              echo "\`FORGE_E2E_CLERK_SESSION\` is not configured."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        if: steps.preflight.outputs.enabled == 'true'
      - uses: pnpm/action-setup@v6
        if: steps.preflight.outputs.enabled == 'true'
        with:
          run_install: false
      - uses: actions/setup-node@v6
        if: steps.preflight.outputs.enabled == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - if: steps.preflight.outputs.enabled == 'true'
        run: bash scripts/ci/install.sh
      - name: Install Playwright browser
        if: steps.preflight.outputs.enabled == 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Run live happy-path E2E
        if: steps.preflight.outputs.enabled == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PROD_URL }}
          FORGE_E2E_LIVE: 'true'
          CI: 'true'
        run: pnpm exec playwright test e2e/forge-happy-path.spec.ts --grep "live install"

  # ---------------------------------------------------------------------------
  # 7. Notify Slack — always runs, branches on success vs failure.
  # ---------------------------------------------------------------------------
  notify:
    name: Slack notify
    needs: [verify, build, preflight, migrate, vercel-prod, sentry-release, smoke, live-e2e]
    if: always() && needs.preflight.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Compute status
        id: status
        run: |
          if [ "${{ needs.verify.result }}" = "success" ] \
             && [ "${{ needs.build.result }}" = "success" ] \
             && { [ "${{ needs.migrate.result }}" = "success" ] || [ "${{ needs.migrate.result }}" = "skipped" ]; } \
             && [ "${{ needs.vercel-prod.result }}" = "success" ] \
             && [ "${{ needs.sentry-release.result }}" = "success" ] \
             && [ "${{ needs.smoke.result }}" = "success" ] \
             && [ "${{ needs.live-e2e.result }}" = "success" ]; then
            {
              echo "outcome=success"
              echo "emoji=:rocket:"
              echo "color=#36a64f"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "outcome=failure"
              echo "emoji=:rotating_light:"
              echo "color=#cc0000"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Slack webhook
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          OUTCOME: ${{ steps.status.outputs.outcome }}
          EMOJI: ${{ steps.status.outputs.emoji }}
          COLOR: ${{ steps.status.outputs.color }}
          PROD_URL: ${{ needs.vercel-prod.outputs.prod_url }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg text "${EMOJI} Forge prod deploy ${OUTCOME} — ${GITHUB_SHA}" \
            --arg color "${COLOR}" \
            --arg sha "${GITHUB_SHA}" \
            --arg url "${PROD_URL:-n/a}" \
            --arg run "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              text: $text,
              attachments: [{
                color: $color,
                fields: [
                  { title: "Commit", value: $sha, short: true },
                  { title: "Prod URL", value: $url, short: true },
                  { title: "Run", value: $run, short: false }
                ]
              }]
            }')
          # --data-binary @- so the JSON is never echoed in logs.
          if ! printf '%s' "${PAYLOAD}" | curl -fsS -X POST -H 'Content-Type: application/json' \
            --data-binary @- "${SLACK_WEBHOOK_URL}" >/dev/null; then
            echo "::warning::Slack notification failed; deploy result is unchanged."
          fi
      - name: Slack webhook not configured
        if: env.SLACK_WEBHOOK_URL == ''
        run: echo "SLACK_WEBHOOK_URL is not configured; skipping deploy notification."

  # ---------------------------------------------------------------------------
  # 8. On failure, open a GitHub issue so an on-call human investigates
  #    before any rollback decision.
  # ---------------------------------------------------------------------------
  open-failure-issue:
    name: Open issue on failure
    needs: [verify, build, preflight, migrate, vercel-prod, sentry-release, smoke, live-e2e]
    if: always() && contains(needs.*.result, 'failure') && (needs.preflight.result != 'failure' || needs.preflight.outputs.deploy_enabled == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const sha = process.env.GITHUB_SHA;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const failedJobs = [
              ['verify', '${{ needs.verify.result }}'],
              ['build', '${{ needs.build.result }}'],
              ['preflight', '${{ needs.preflight.result }}'],
              ['migrate', '${{ needs.migrate.result }}'],
              ['vercel-prod', '${{ needs.vercel-prod.result }}'],
              ['sentry-release', '${{ needs.sentry-release.result }}'],
              ['smoke', '${{ needs.smoke.result }}'],
              ['live-e2e', '${{ needs.live-e2e.result }}'],
            ].filter(([, r]) => r !== 'success').map(([j, r]) => `- \`${j}\`: ${r}`).join('\n');
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `prod deploy failed — ${sha.slice(0, 7)}`,
                labels: ['deploy-failure', 'p0'],
                body: [
                  `Production deploy for commit \`${sha}\` failed.`,
                  '',
                  '**Failed jobs:**',
                  failedJobs,
                  '',
                  `**Workflow run:** ${runUrl}`,
                  '',
                  'Rollback procedure: see [docs/CI_CD.md](../blob/main/docs/CI_CD.md#rollback-procedure).',
                  '',
                  'Auto-opened by `.github/workflows/deploy-prod.yml`.',
                ].join('\n'),
              });
            } catch (error) {
              core.warning(`Could not open deploy-failure issue: ${error.message}`);
            }
