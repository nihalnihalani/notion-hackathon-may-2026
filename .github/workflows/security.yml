# =============================================================================
# Forge — Security scanning
#
# Runs on every PR + weekly cron. Two jobs:
#   1. pnpm audit — fails on `high` or `critical` advisories. We intentionally
#      do NOT fail on `moderate` because dev-only transitive deps frequently
#      sit at moderate and would otherwise wedge every PR. Cron job will
#      escalate moderate to a Slack ping if needed (future).
#   2. Gitleaks scans git history for committed secrets. This replaces the
#      previous reminder-only job so the security workflow has no placeholder
#      checks.
#
# Required GitHub secrets: none.
# =============================================================================
name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Mondays 09:00 UTC: catches anything published over the weekend before
    # the engineering week starts.
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  audit:
    name: pnpm audit (high/critical only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: bash scripts/ci/install.sh
      - name: pnpm audit
        run: |
          echo "::group::pnpm audit (high)"
          # --audit-level=high causes pnpm to exit non-zero ONLY when at
          # least one high/critical advisory exists. Moderate / low pass.
          pnpm audit --audit-level=high --prod
          echo "::endgroup::"
      - name: Save audit JSON (always)
        if: always()
        run: pnpm audit --json > pnpm-audit.json || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-audit-${{ github.sha }}
          path: pnpm-audit.json
          retention-days: 14

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks detect
        run: |
          go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect \
            --source . \
            --redact \
            --no-banner \
            --verbose
