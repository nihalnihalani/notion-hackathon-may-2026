# =============================================================================
# Forge — Security scanning
#
# Runs on every PR + weekly cron. Three jobs:
#   1. pnpm audit — fails on `high` or `critical` advisories. We intentionally
#      do NOT fail on `moderate` because dev-only transitive deps frequently
#      sit at moderate and would otherwise wedge every PR. Cron job will
#      escalate moderate to a Slack ping if needed (future).
#   2. CodeQL JavaScript/TypeScript scan when the repo is public. This repo is
#      currently private; skipping CodeQL avoids GHAS/code-scanning failures
#      until Advanced Security is enabled or the repo flips public.
#   3. Secret-scan placeholder (GitHub Advanced Security handles real
#      detection at the org level; this job documents that it runs).
#
# Required GitHub secrets: none — pnpm audit and CodeQL use the `GITHUB_TOKEN`
# provided automatically by Actions.
# =============================================================================
name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Mondays 09:00 UTC: catches anything published over the weekend before
    # the engineering week starts.
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  NODE_VERSION: '20'

jobs:
  audit:
    name: pnpm audit (high/critical only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: bash scripts/ci/install.sh
      - name: pnpm audit
        run: |
          echo "::group::pnpm audit (high)"
          # --audit-level=high causes pnpm to exit non-zero ONLY when at
          # least one high/critical advisory exists. Moderate / low pass.
          pnpm audit --audit-level=high --prod
          echo "::endgroup::"
      - name: Save audit JSON (always)
        if: always()
        run: pnpm audit --json > pnpm-audit.json || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-${{ github.sha }}
          path: pnpm-audit.json
          retention-days: 14

  codeql:
    name: CodeQL (JavaScript/TypeScript)
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` adds maintainability rules on top of the
          # default security pack. Worth the extra ~30s for a hackathon repo.
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  secret-scan:
    name: Secret-scan reminder
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reminder
        run: |
          echo "GitHub Advanced Security secret scanning runs at the org level."
          echo "If a leak is detected, GitHub will open a security alert + email the committer."
          echo "See: https://docs.github.com/en/code-security/secret-scanning"
